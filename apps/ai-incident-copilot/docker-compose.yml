services:
  oracle:
    image: container-registry.oracle.com/database/free:23.26.1.0
    container_name: oracle26ai
    environment:
      ORACLE_PWD: Welcome_123
    ports:
      - "1521:1521"
    volumes:
      - oracle26ai-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "sh", "-c", "echo exit | sqlplus -S system/$$ORACLE_PWD@FREEPDB1 | grep -q Connected"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 5m

volumes:
  oracle26ai-data:
